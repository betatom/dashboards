name: Deploy via SFTP

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  deploy:
    name: Deploy static files via SFTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via SFTP with lftp
        env:
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_PASS: ${{ secrets.FTP_PASSWORD }}
          SFTP_HOST: 185.194.90.29
          REMOTE_DIR: /home/cfefacbc/dashboards.betashift.ai
        run: |
          lftp -u "$SFTP_USER","$SFTP_PASS" sftp://"$SFTP_HOST" <<EOF
          set sftp:auto-confirm yes
          set net:max-retries 3
          set net:reconnect-interval-base 5
          mirror --reverse --verbose --delete \
            --exclude ^\.git/ \
            --exclude ^\.github/ \
            --exclude ^README\.md$ \
            --exclude ^LICENSE$ \
            ./ $REMOTE_DIR/
          bye
          EOF
